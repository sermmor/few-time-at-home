name: Build macOS

on:
  workflow_dispatch:   # triggered manually from the Actions tab

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner with Xcode 15

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Flutter ─────────────────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: desktopApp
        run: flutter pub get

      # ── Build ───────────────────────────────────────────────────────────────
      # FLUTTER_XCODE_CODE_SIGN_IDENTITY="-" → ad-hoc signature (no Apple Developer account needed)
      # FLUTTER_XCODE_CODE_SIGN_STYLE=Manual → stops Xcode fetching a provisioning profile
      # FLUTTER_XCODE_DEVELOPMENT_TEAM=""    → clears any team ID that would trigger profile lookup
      #
      # Xcode applies Release.entitlements (referenced in the .xcodeproj) during the build,
      # so no separate codesign step is needed — doing so would break the nested-framework
      # signatures that Xcode already set up correctly.
      - name: Build macOS release
        working-directory: desktopApp
        env:
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: "-"
          FLUTTER_XCODE_CODE_SIGN_STYLE: Manual
          FLUTTER_XCODE_DEVELOPMENT_TEAM: ""
        run: flutter build macos --release

      # ── Package ─────────────────────────────────────────────────────────────
      # --symlinks preserves the framework symlinks that macOS requires.
      - name: Create ZIP archive
        run: |
          cd desktopApp/build/macos/Build/Products/Release
          zip -r --symlinks desktop_app.zip desktop_app.app

      # ── Upload ──────────────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: desktopApp/build/macos/Build/Products/Release/desktop_app.zip
          retention-days: 30
