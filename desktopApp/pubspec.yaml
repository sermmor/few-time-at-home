name: desktop_app
description: "FT@Home Desktop — standalone remote profile viewer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── Google Drive ──────────────────────────────────────────────────────────────
  googleapis:      ^13.2.0
  googleapis_auth: ^1.6.0

  # ── Storage ───────────────────────────────────────────────────────────────────
  path_provider:        ^2.1.5
  path:                 ^1.9.1
  shared_preferences:   ^2.3.5
  flutter_secure_storage: ^9.2.4

  # ── Desktop window (fullscreen) ───────────────────────────────────────────────
  window_manager: ^0.4.3

  # ── Links ─────────────────────────────────────────────────────────────────────
  url_launcher: ^6.3.1

  # ── Utils ─────────────────────────────────────────────────────────────────────
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
